<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroZone -Farm Equipment</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
<style>
body { margin:0; font-family:'Poppins',sans-serif; background:#f4f4f4; }
.content { padding:20px; max-width:1200px; margin:auto; }
h2 { text-align:center; margin-top:0; }

.products {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.product-wrapper {
    padding:15px;
    background:#ffffff;
    border-radius:12px;
    transition:0.3s;
}
.product-wrapper:hover {
    transform:translateY(-5px);
    box-shadow:0 5px 15px rgb(255, 255, 255);
}

.product {
    background:white;
    border:1px solid #ffffff;
    border-radius:8px;
    padding:10px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    text-align:center;
}

/* 🔥 All Product Images Same Size */
.product img {
    width: 100%;
    height: 180px;            /* SAME height */
    object-fit: contain;      /* No distortion */
    background: #ffffff;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.price { font-weight:bold; color:#228B22; }

.cart-button, .buy-button {
    margin-top:10px;
    padding:8px 10px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#32CD32,#228B22);
    font-weight:bold;
}
.cart-button:hover, .buy-button:hover {
    background:linear-gradient(135deg,#1e7b1e,#196619);
}

.cart {
    position:fixed;
    right:20px;
    top:80px;
    width:300px;
    max-height:80vh;
    overflow-y:auto;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.cart-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
    padding:5px 0;
}

.remove-btn {
    background:red;
    color:white;
    border:none;
    border-radius:4px;
    padding:2px 6px;
    cursor:pointer;
}

#buy-all-btn {
    width:100%;
    margin-top:10px;
    padding:10px;
    font-weight:bold;
    border-radius:5px;
    background:#32CD32;
    color:white;
    cursor:pointer;
    border:none;
}
#buy-all-btn:hover { background:#228B22; }

.back-button {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #228B22;
    font-size: 24px;
    cursor: pointer;
    text-decoration: none;
}

/* 🛒 Cart Icon */
.cart-icon{
    position:fixed;
    top:20px;
    right:20px;
    width:50px;
    height:50px;
    background:#228B22;
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    z-index:9999; /* ✅ IMPORTANT */
    text-decoration:none;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    font-size:12px;
    padding:2px 6px;
    border-radius:50%;
    font-weight:bold;
}

</style>
</head>
<body>


    <!-- 🛒 Cart Icon -->
<a href="cart.html" class="cart-icon">
    <i class="fas fa-shopping-cart"></i>
    <span class="cart-count" id="cart-count">0</span>
</a>

<div class="content">
    <a href="getstarted.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
    </a>


<div class="content">
    <h2>Farm Equipment</h2>
    <a href="getstarted.html" class="back-button"><i class="fas fa-arrow-left"></i></a>

    <div class="products">

        <div class="product-wrapper"><div class="product"><img src="/images/old-hand-plow-e1Xe383-600.jpg" alt="Plow"><h4>Plow</h4><span class="price">Rs.2000</span><button class="cart-button" onclick="addToCart('Plow',2000)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/harrows.png" alt="Harrows"><h4>Harrows</h4><span class="price">Rs.15000</span><button class="cart-button" onclick="addToCart('Harrows',15000)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/tiller.jpg" alt="Tiller"><h4>Tiller</h4><span class="price">Rs.25000</span><button class="cart-button" onclick="addToCart('Tiller',25000)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/culti.png" alt="Cultivator"><h4>Cultivator</h4><span class="price">Rs.18000</span><button class="cart-button" onclick="addToCart('Cultivator',18000)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/hoe.jpg" alt="Hoe"><h4>Hoe</h4><span class="price">Rs.150</span><button class="cart-button" onclick="addToCart('Hoe',150)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/rake.png" alt="Rake"><h4>Rake</h4><span class="price">Rs.250</span><button class="cart-button" onclick="addToCart('Rake',250)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/pngimg.com - shovel_PNG108902.png" alt="Shovel"><h4>Shovel</h4><span class="price">Rs.300</span><button class="cart-button" onclick="addToCart('Shovel',300)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/pngimg.com - shovel_PNG108903.png" alt="Spade"><h4>Spade</h4><span class="price">Rs.250</span><button class="cart-button" onclick="addToCart('Spade',250)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/sickle.jpg" alt="Sickle"><h4>Sickle</h4><span class="price">Rs.250</span><button class="cart-button" onclick="addToCart('Sickle',250)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/chain.jpg" alt="Chainsaw"><h4>Chainsaw</h4><span class="price">Rs.3000</span><button class="cart-button" onclick="addToCart('Chainsaw',3000)">Add to Cart</button></div></div>

        <div class="product-wrapper"><div class="product"><img src="/images/tractor.png" alt="Tractor"><h4>Tractor</h4><span class="price">Rs.200000</span><button class="cart-button" onclick="addToCart('Tractor',200000)">Add to Cart</button></div></div>

    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart') || '[]');

function addToCart(name, price){
    cart.push({
        productName: name,
        price: price,
        quantity: 1
    });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
}

function updateCartCount(){
    document.getElementById('cart-count').textContent = cart.length;
}

updateCartCount();
</script>

</body>
</html>
