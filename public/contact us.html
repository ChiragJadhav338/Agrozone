 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AgroZone</title>

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
        }

        .hero {
            background: #228B22;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid #32CD32;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .box {
            background: #e9f5e9;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .get-touch-title{
            font-weight:700;
            margin-bottom:20px;
        }

        .contact-card{
            display:flex;
            align-items:center;
            padding:16px;
            border-radius:12px;
            margin-bottom:15px;
            background:#fff;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
            text-decoration:none;
            color:#000;
            transition: 0.2s;
        }

        .contact-card:hover {
            background:#f9f9f9;
            text-decoration:none;
        }

        .contact-card i{
            font-size:20px;
            color:#fff;
            padding:14px;
            border-radius:50%;
            margin-right:15px;
        }

        .contact-card h6{
            margin:0;
            font-weight:600;
        }

        .contact-card p{
            margin:0;
            font-size:14px;
        }

        .phone{ background:#e8f0ff; }
        .phone i{ background:#2f6bff; }

        .whatsapp{ background:#e9fdf0; }
        .whatsapp i{ background:#25d366; }

        button{
            font-weight:500;
        }
    </style>
</head>

<body>

<div class="hero">
    <a href="getstarted.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h1>Contact Us</h1>
    <p>We'd love to hear from you!</p>
</div>

<div class="container mt-5">

    <!-- Contact Form -->
    <div class="box">
        <h3>Send Us a Message</h3>
        <form onsubmit="sendContact(event)">
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" class="form-control" id="mobile" pattern="[0-9]{10}" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea class="form-control" id="message" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn btn-success">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </form>
    </div>

    <!-- Get In Touch -->
    <h3 class="text-center get-touch-title">Get In Touch</h3>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Phone -->
            <a href="tel:+919373337494" class="contact-card phone">
                <i class="fas fa-phone"></i>
                <div>
                    <h6>Phone</h6>
                    <p>+91 9373337494</p>
                </div>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/919373337494?text=Hello%20AgroZone%2C%20I%20want%20to%20enquire%20about%20your%20services."
               target="_blank"
               class="contact-card whatsapp">
                <i class="fab fa-whatsapp"></i>
                <div>
                    <h6>WhatsApp</h6>
                    <p>+91 9373337494</p>
                </div>
            </a>

        </div>
    </div>

</div>

<script>
function sendContact(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        message: document.getElementById("message").value
    };

    fetch("http://localhost:5000/save-contact", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) throw new Error("Network response was not ok");
        return res.text();
    })
    .then(msg => {
        alert("Message sent successfully!");
        document.querySelector("form").reset();
    })
    .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
