 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroZone - Checkout</title>
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:'Poppins', sans-serif; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.15);}
h2 { text-align:center; color:#228B22; margin-top:0; }
label { display:block; margin:10px 0 5px; font-weight:bold; }
input, select { width:100%; padding:10px; border-radius:5px; border:1px solid #ddd; margin-bottom:15px; box-sizing:border-box; }
.cart-summary { margin-top:20px; border:1px solid #ddd; border-radius:5px; padding:10px; background:#f9f9f9; }
.cart-item { display:flex; justify-content:space-between; margin-bottom:5px; }
.total { font-weight:bold; text-align:right; margin-top:10px; }
.buy-button { width:100%; padding:12px; background:linear-gradient(135deg,#32CD32,#228B22); border:none; color:white; font-size:16px; font-weight:bold; border-radius:50px; cursor:pointer; margin-top:15px; }
.buy-button:hover { background:linear-gradient(135deg,#1e7b1e,#196619); }
.back-icon { font-size:30px; color:#228B22; margin:20px; cursor:pointer; display:inline-block; text-decoration:none; }
.back-icon:hover { color:#1e7b1e; }
.empty-cart { text-align:center; color:#888; margin:10px 0; }
</style>
</head>
<body>

<a class="back-icon" onclick="history.back()">&#8592;  </a>
<div class="container">
    <h2>Checkout</h2>
    <form id="checkout-form">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" required placeholder="Enter your full name">

        <label for="contact">Contact Number</label>
        <input type="text" id="contact" required placeholder="Enter your phone number">

        <label for="address">Delivery Address</label>
        <input type="text" id="address" required placeholder="Enter your address">

        <label for="payment">Payment Type</label>
        <select id="payment" required>
            <option value="">Select Payment Method</option>
            <option value="Cash on Delivery">Cash on Delivery</option>
        </select>

        <div class="cart-summary">
            <h3>Cart Summary</h3>
            <div id="cart-items"></div>
            <div class="total" id="total"></div>
        </div>

        <button type="submit" class="buy-button">Buy Now</button>
    </form>
</div>
<footer>
    <p>© 2026 AgroZone • Growing Smarter Together</p>
</footer>

<script>
const cart = JSON.parse(localStorage.getItem('cart') || '[]');
const total = Number(localStorage.getItem('total') || 0);
const cartItemsDiv = document.getElementById('cart-items');
const totalDiv = document.getElementById('total');

function renderCart() {
    cartItemsDiv.innerHTML = '';
    if(cart.length === 0) {
        cartItemsDiv.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
        totalDiv.textContent = '';
        return;
    }
    cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.textContent = `${item.name} - Rs.${item.price}`;
        cartItemsDiv.appendChild(div);
    });
    totalDiv.textContent = `Total: Rs.${total}`;
}

// Render cart on page load
renderCart();

// Submit order function
function placeOrder(e) {
    e.preventDefault();

    if(cart.length === 0){
        alert('Your cart is empty!');
        return;
    }

    const orderData = {
        fullname: document.getElementById('fullname').value,
        contact: document.getElementById('contact').value,
        address: document.getElementById('address').value,
        paymentMode: document.getElementById('payment').value,
        cart: cart,
        totalPrice: total
    };

    fetch('http://localhost:5000/buy-now', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderData)
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        // Clear cart after success
        localStorage.removeItem('cart');
        localStorage.removeItem('total');
        window.location.href = 'getstarted.html';
    })
    .catch(err => alert('Error placing order: ' + err));
}

// Attach to form
document.getElementById('checkout-form').addEventListener('submit', placeOrder);
</script>

</body>
</html>
